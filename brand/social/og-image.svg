<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#FAF7F2"/>

  <!-- Subtle border accent -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#3D6B4F" stroke-width="1" opacity="0.2"/>

  <!-- Mark, top-left -->
  <g transform="translate(80, 80) scale(0.75)">
    <circle cx="100" cy="100" r="15" fill="#3D6B4F"/>
    <ellipse cx="100" cy="70" rx="18" ry="10" fill="#5A8E6D" opacity="0.85" transform="rotate(-15 100 70)"/>
    <ellipse cx="130" cy="85" rx="20" ry="11" fill="#5A8E6D" opacity="0.75" transform="rotate(50 130 85)"/>
    <ellipse cx="125" cy="125" rx="22" ry="12" fill="#5A8E6D" opacity="0.65" transform="rotate(115 125 125)"/>
    <ellipse cx="85" cy="135" rx="25" ry="12" fill="#5A8E6D" opacity="0.55" transform="rotate(180 85 135)"/>
    <ellipse cx="65" cy="100" rx="25" ry="12" fill="#5A8E6D" opacity="0.45" transform="rotate(245 65 100)"/>
    <circle cx="100" cy="100" r="8" fill="#FAF7F2"/>
    <circle cx="100" cy="100" r="4" fill="#3D6B4F"/>
  </g>
  <text x="240" y="170" font-family="Cormorant Garamond, Georgia, serif" font-size="56" font-weight="600" fill="#3D6B4F">Freyja Labs</text>

  <!-- Headline, center-left -->
  <text x="80" y="350" font-family="Cormorant Garamond, Georgia, serif" font-size="84" font-weight="500" fill="#1C1C1C">Professional development</text>
  <text x="80" y="430" font-family="Cormorant Garamond, Georgia, serif" font-size="84" font-style="italic" font-weight="500" fill="#3D6B4F">where growth begins.</text>

  <!-- Bottom accent and URL -->
  <line x1="80" y1="510" x2="200" y2="510" stroke="#3D6B4F" stroke-width="2"/>
  <text x="80" y="555" font-family="Outfit, sans-serif" font-size="22" font-weight="400" fill="#6B5B3E" letter-spacing="2">PROFESSIONAL DEVELOPMENT  ·  CUSTOM DESIGN  ·  HANDS-ON</text>
  <text x="1080" y="555" text-anchor="end" font-family="Outfit, sans-serif" font-size="24" font-weight="500" fill="#1C1C1C">freyjalabs.com</text>
</svg>